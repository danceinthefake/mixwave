<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <g fill="none" stroke-width="2.2" stroke-linecap="round">
    <!-- 5 waves converging at the centre, one per instrument flavor.
         Each wave is a short S-curve that flows inward and ends just
         shy of the centre, where they all meet at a white mix point. -->

    <!-- Top — drums (magenta) -->
    <path d="M 16 3 C 14 6, 18 10, 16 14" stroke="#e94886" />

    <!-- Upper-right — keyboard (cyan) -->
    <path d="M 28 11 C 24 11, 22 16, 18 14.5" stroke="#56d2e6" />

    <!-- Lower-right — guitar (lime) -->
    <path d="M 25 27 C 22 24, 22 18, 18 18" stroke="#b5e651" />

    <!-- Lower-left — bass (orange) -->
    <path d="M 7 27 C 10 24, 10 18, 14 18" stroke="#f0a849" />

    <!-- Upper-left — pad (violet) -->
    <path d="M 4 11 C 8 11, 10 16, 14 14.5" stroke="#c485f3" />

    <!-- Centre mix point — single bright dot where the waves meet. -->
    <circle cx="16" cy="16" r="2" fill="#ffffff" />
  </g>
</svg>
