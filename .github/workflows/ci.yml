name: CI

# Runs the test + coverage suite on every push to main and every
# pull request. Deploy is intentionally not wired up — no hosting
# target's been picked. When that's chosen, add a separate
# `deploy.yml` workflow rather than tacking it on here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight run on the same branch when a new push lands —
# saves runner minutes during rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    name: Elixir tests + warnings
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mixchamb_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      # Tests need an admin password configured (the AdminAuth plug
      # fails closed without one).
      ADMIN_USER: admin
      ADMIN_PASSWORD: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0.1"

      - name: Cache deps + build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install hex deps
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Compile (warnings = errors)
        run: mix compile --warnings-as-errors

      - name: Format check
        run: mix format --check-formatted

      - name: Run tests + coverage
        run: mix coveralls.json

      - name: Upload Elixir coverage report
        uses: actions/upload-artifact@v4
        with:
          name: elixir-coverage
          path: cover/excoveralls.json
          if-no-files-found: error
          retention-days: 7

  vue:
    name: Vue / TS tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `package.json` pulls live_vue / phoenix / phoenix_html /
      # phoenix_live_view via `file:./deps/...`, which means those
      # Elixir deps need to be on disk before `npm ci` can resolve
      # the file: links. Set up BEAM + run `mix deps.get` first.
      - name: "Set up Elixir + OTP (for the file: deps)"
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.0.1"

      - name: Cache mix deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-deps-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-

      - name: Fetch mix deps (live_vue + friends)
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install JS deps
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format check (oxfmt)
        run: npm run format:check

      - name: Run vitest + coverage
        run: npm run test:coverage

      - name: Upload Vue coverage report
        uses: actions/upload-artifact@v4
        with:
          name: vue-coverage
          path: coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 7

  badges:
    name: Update coverage badges
    needs: [elixir, vue]
    runs-on: ubuntu-latest
    # Only refresh badges on main pushes; PRs run coverage but
    # don't push artefacts. Avoids forks of this repo trying to
    # write to the badges branch.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout main (badge script + assumptions)
        uses: actions/checkout@v4
        with:
          # Full history needed for the orphan-branch dance below.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Download Elixir coverage
        uses: actions/download-artifact@v4
        with:
          name: elixir-coverage
          path: cover/

      - name: Download Vue coverage
        uses: actions/download-artifact@v4
        with:
          name: vue-coverage
          path: coverage/

      - name: Generate badge SVGs
        run: |
          set -euo pipefail
          mkdir -p _badges

          # Elixir % comes from excoveralls.json — line coverage
          # is the union of all source files' coverage arrays:
          # null = non-executable, 0 = uncovered, >0 = covered.
          ex_pct=$(node -e '
            const j = JSON.parse(require("fs").readFileSync("cover/excoveralls.json", "utf8"));
            const lines = j.source_files.flatMap((f) => f.coverage).filter((n) => n !== null);
            const covered = lines.filter((n) => n > 0).length;
            console.log(Math.round((covered / lines.length) * 100));
          ')

          # Vue % from vitest's json-summary — total.lines.pct.
          vue_pct=$(node -e '
            const j = JSON.parse(require("fs").readFileSync("coverage/coverage-summary.json", "utf8"));
            console.log(Math.round(j.total.lines.pct));
          ')

          echo "Elixir coverage: ${ex_pct}%"
          echo "Vue coverage:    ${vue_pct}%"

          node scripts/badge.mjs --label "elixir coverage" --value "${ex_pct}%" \
            > _badges/elixir-coverage.svg
          node scripts/badge.mjs --label "vue coverage" --value "${vue_pct}%" \
            > _badges/vue-coverage.svg

      - name: Push badges to the badges branch
        env:
          # GITHUB_TOKEN with contents:write (granted via the
          # permissions block above) lets us push without secrets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Stash the freshly-generated SVGs outside the work tree
          # so we can switch branches without losing them.
          tmp=$(mktemp -d)
          cp _badges/*.svg "$tmp"/

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Orphan branch — no parent commit, no source code, just
          # the badge SVGs. Recreated fresh on every run so the
          # branch never accumulates a long history.
          git checkout --orphan badges
          git rm -rf --quiet . 2>/dev/null || true

          mkdir -p badges
          cp "$tmp"/*.svg badges/

          git add badges/
          git commit -m "chore(ci): refresh coverage badges" || {
            echo "No badge change; skipping push."
            exit 0
          }

          git push --force origin badges
